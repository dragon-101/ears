name: Monitor Discord Quests

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout monitor repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest quests.json
        run: |
          curl -s \
            -H "Accept: application/octet-stream" \
            -A "Mozilla/5.0 (compatible; GitHub Actions)" \
            "https://raw.githubusercontent.com/aamiaa/discord-api-diff/main/quests.json" \
            -o quests_new.json

          echo "--- First 3 lines of downloaded file ---"
          head -3 quests_new.json

          if ! python3 -c "import json; json.load(open('quests_new.json'))" 2>/dev/null; then
            echo "ERROR: Downloaded file is not valid JSON. Aborting."
            cat quests_new.json
            exit 1
          fi

          echo "Download OK — valid JSON."

      - name: Compare with saved version
        id: compare
        run: |
          if [ ! -f "quests.json" ]; then
            echo "No baseline found — saving current file as baseline."
            cp quests_new.json quests.json
            echo "changed=baseline" >> $GITHUB_OUTPUT

          elif ! diff -q quests.json quests_new.json > /dev/null 2>&1; then
            echo "Change detected."
            mv quests_new.json quests.json
            echo "changed=true" >> $GITHUB_OUTPUT

          else
            echo "No changes."
            rm quests_new.json
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated quests.json
        if: steps.compare.outputs.changed == 'true' || steps.compare.outputs.changed == 'baseline'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quests.json
          git commit -m "Sync quests.json [skip ci]"
          git push origin main

      - name: Send Discord notification
        run: |
          STATUS="${{ steps.compare.outputs.changed }}"

          if [ "$STATUS" == "true" ]; then
            MSG="🚨 **__QUEST UPDATE DETECTED!__** 🚨\n\nThe **quests.json** file has changed on the Discord API diff repo.\n\n> <https://github.com/aamiaa/discord-api-diff/blob/main/quests.json>"
          elif [ "$STATUS" == "baseline" ]; then
            MSG="📦 **Baseline saved** — no prior version existed. Monitoring started."
          else
            MSG="🔍 **Routine check complete** — no changes found in quests.json."
          fi

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"
