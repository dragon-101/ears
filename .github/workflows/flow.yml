name: blehh
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your monitor repo
        uses: actions/checkout@v4

      - name: Download latest file from aamiaa
        run: |
          # Download the raw file directly
          curl -s -L "https://raw.githubusercontent.com" -o quests_new.json

      - name: Compare and Update
        id: compare
        run: |
          # Check if your local quests.json exists
          if [ ! -f "quests.json" ]; then
            echo "First run: Creating quests.json"
            mv quests_new.json quests.json
            echo "changed=true" >> $GITHUB_OUTPUT
          elif ! cmp -s "quests.json" "quests_new.json"; then
            echo "Difference detected!"
            mv quests_new.json quests.json
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No differences found."
            rm quests_new.json
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Changes to your repo
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add quests.json
          git commit -m "Update quests.json from source [skip ci]"
          git push

      - name: Notify Discord
        run: |
          if [ "${{ steps.compare.outputs.changed }}" == "true" ]; then
            MESSAGE="🚀 **Update Detected!**\nThe \`quests.json\` file has changed. I have updated the file in your repository."
          else
            MESSAGE="✅ **Check Complete**: No changes found in \`quests.json\`. Everything is up to date."
          fi
          
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$MESSAGE\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
