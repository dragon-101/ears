name: blehh
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your monitor repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest file
        run: |
          curl -s -L "https://raw.githubusercontent.com" -o quests_new.json

      - name: Compare and Update
        id: compare
        run: |
          if [ ! -f "quests.json" ] || ! diff -q -w "quests.json" "quests_new.json" > /dev/null; then
            mv quests_new.json quests.json
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No differences found."
            rm quests_new.json
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quests.json
          git commit -m "Sync quests.json [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Notify Discord
        run: |
          if [ "${{ steps.compare.outputs.changed }}" == "true" ]; then
            MSG="🚀 **Update Detected!** Quests file has been synced."
          else
            MSG="✅ **Check Complete**: No changes found."
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" ${{ secrets.DISCORD_WEBHOOK }}
