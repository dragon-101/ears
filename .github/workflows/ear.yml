name: Monitor Discord API Tracker
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Check for file changes
        id: check
        run: |
          FILES=("user-quests-uk.json" "quests.json")
          REPO="xGustavvo/discord-api-tracker"
          CHANGED_FILES=""

          for FILE in "${FILES[@]}"; do
            LATEST_HASH=$(curl -s "https://api.github.com" | jq -r '.[0].sha')
            CACHE_FILE=".last_hash_$FILE"
            
            if [ -f "$CACHE_FILE" ]; then
              OLD_HASH=$(cat "$CACHE_FILE")
            else
              OLD_HASH=""
            fi

            if [ "$LATEST_HASH" != "$OLD_HASH" ] && [ "$LATEST_HASH" != "null" ]; then
              echo "$LATEST_HASH" > "$CACHE_FILE"
              CHANGED_FILES="$CHANGED_FILES\n- $FILE"
            fi
          done
          echo "changes=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Update hash cache
        if: steps.check.outputs.changes != ''
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .last_hash_*
          git commit -m "Update file hashes [skip ci]"
          git push

      - name: Notify Discord
        if: steps.check.outputs.changes != ''
        run: |
          MESSAGE="🚨 **File Changes Detected in $REPO**:${{ steps.check.outputs.changes }}"
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$MESSAGE\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
