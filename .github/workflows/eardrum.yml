name: ear drums v1
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your monitor repo
        uses: actions/checkout@v4

      - name: Check for changes in aamiaa/discord-api-diff
        id: check
        run: |
          REPO="aamiaa/discord-api-diff"
          FILE="quests.json"
          
          # The full URL must be on one line
          RESPONSE=$(curl -s "https://api.github.com")
          
          # This filter extracts the SHA safely
          LATEST_HASH=$(echo "$RESPONSE" | jq -r 'if type=="array" then .[0].sha else .sha end')
          
          if [ "$LATEST_HASH" == "null" ] || [ -z "$LATEST_HASH" ]; then
            echo "Error: Could not fetch hash. API Response was:"
            echo "$RESPONSE"
            exit 1
          fi

          CACHE_FILE=".last_hash_quests"
          if [ -f "$CACHE_FILE" ]; then
            OLD_HASH=$(cat "$CACHE_FILE")
          else
            OLD_HASH=""
          fi

          if [ "$LATEST_HASH" != "$OLD_HASH" ]; then
            echo "$LATEST_HASH" > "$CACHE_FILE"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "hash=$LATEST_HASH" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Hash Cache in your repo
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .last_hash_quests
          git commit -m "Update tracked hash for quests.json [skip ci]" || echo "No changes"
          git push

      - name: Notify Discord
        if: steps.check.outputs.changed == 'true'
        run: |
          MESSAGE="🚀 **Update Detected!**\nFile: \`quests.json\` in \`aamiaa/discord-api-diff\` has changed.\nView: https://github.com"
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"$MESSAGE\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
